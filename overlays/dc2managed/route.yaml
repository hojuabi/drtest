# HTTPS Route on drtbopp apps domain (edit if your *.apps DNS differs).
apiVersion: route.openshift.io/v1
kind: Route
metadata:
  name: regional-dr-test
spec:
  host: regional-dr-test.apps.dc2managed.ptt.odine.lab
  to:
    kind: Service
    name: regional-dr-test
    weight: 100
  port:
    targetPort: http
  wildcardPolicy: None
  tls:
    termination: edge
    insecureEdgeTerminationPolicy: None
