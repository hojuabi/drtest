apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

namespace: regional-dr-test

configMapGenerator:
  - name: regional-dr-test-dashboard
    files:
      - index.html=dashboard/index.html
  - name: regional-dr-test-writer
    files:
      - writer.sh=scripts/writer.sh
  - name: regional-dr-test-httpd-extra
    files:
      - 99-dr-test.conf=httpd/99-dr-test.conf

generatorOptions:
  disableNameSuffixHash: true

labels:
  - pairs:
      app.kubernetes.io/name: regional-dr-test
    includeSelectors: true

resources:
  - pvc-rbd.yaml
  - pvc-cephfs.yaml
  - deployment.yaml
  - service.yaml
